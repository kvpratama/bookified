<!doctype html>
<html lang="en">
  <head>
    <title>Confirm your email</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style type="text/css">
      body {
        margin: 0;
        padding: 0;
        background-color: #fdf8f5; /* Warm Cream */
        font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: #3c2f2f; /* Dark Chocolate */
        -webkit-font-smoothing: antialiased;
      }

      table {
        border-collapse: collapse;
      }

      .wrapper {
        width: 100%;
        background-color: #fdf8f5;
        padding-bottom: 40px;
      }

      .container {
        max-width: 600px;
        margin: 0 auto;
        padding: 40px 20px;
        text-align: center;
      }

      .logo {
        margin-bottom: 24px;
      }

      .brand-name {
        font-family: Georgia, "Times New Roman", serif;
        font-size: 24px;
        font-weight: 700;
        letter-spacing: -0.01em;
        margin-bottom: 40px;
        color: #3c2f2f;
      }

      h1 {
        font-family: Georgia, "Times New Roman", serif;
        font-size: 28px;
        line-height: 1.3;
        font-weight: 400;
        margin-bottom: 24px;
        color: #3c2f2f;
      }

      p {
        font-size: 16px;
        line-height: 1.6;
        margin-bottom: 30px;
        color: #3c2f2f;
      }

      .button-container {
        margin: 40px 0;
      }

      .button {
        display: inline-block;
        background-color: #3c2f2f;
        color: #fdf8f5 !important;
        text-decoration: none;
        padding: 18px 36px;
        font-weight: 500;
        font-size: 16px;
      }

      .footer {
        margin-top: 60px;
        border-top: 1px solid rgba(60, 47, 47, 0.1);
        padding-top: 30px;
        font-size: 14px;
        color: rgba(60, 47, 47, 0.6);
        font-style: italic;
      }

      .footer-brand {
        font-family: Georgia, "Times New Roman", serif;
        font-weight: 700;
        font-style: normal;
        margin-bottom: 8px;
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <div class="container">
        <!-- Logo Image -->
        <div class="logo">
          <img
            src="{{ .SiteURL }}/logo.png"
            alt="Sanctuary"
            width="100"
            style="display: block; margin: 0 auto"
          />
        </div>

        <div class="brand-name">Sanctuary</div>

        <div class="content">
          <h1>Welcome to Sanctuary.</h1>

          <p>
            Your private reading sanctuary is almost ready. Please confirm your
            residency below to begin your journey and explore the library.
          </p>

          <div class="button-container">
            <a
              href="{{ .ConfirmationURL }}"
              class="button"
              style="color: #fdf8f5"
              >Confirm My Residence</a
            >
          </div>

          <p style="font-size: 14px; margin-top: 40px">
            If you didn't sign up for Sanctuary, you can safely ignore this
            email.
          </p>
        </div>

        <div class="footer">
          <span class="footer-brand">Sanctuary</span>
          Where reading comes alive.
        </div>
      </div>
    </div>
  </body>
</html>
